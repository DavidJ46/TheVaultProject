Description of file (What it does, how it is used, etc):
This file is the seller storefront dashboard page for users who already have a storefront.
It allows the seller to view their storefront banner, logo, brand name, and their current listings.

This page also includes action buttons that let the seller:
- Edit their storefront
- Create a new listing
- View their public storefront

This file acts as the UI structure for the seller's personal storefront management page.
It is different from the public storefront page because this version is meant for the storefront owner.
-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Storefront</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/my_storefront.css') }}">
</head>

<body>
    <main class="storefront-dashboard">

        <!-- back button - Added by Day Ekoi 4/20/26 -->
        <div class="back-row">
            <button class="back-btn" onclick="window.location.href='/storefronts'">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Back
            </button>
        </div>

        <!-- Banner section -->
        <section class="banner-section">
            <h1 class="dashboard-title">My Storefront</h1>

            <!-- banner — background image set by JS if available -->
            <div class="banner-box" id="bannerBox">
                <p id="bannerFallback">Storefront Banner</p>
            </div>

            <!-- overlapping logo -->
            <div class="logo-circle" id="logoCircle">
                <img id="logoImg" alt="Store Logo" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%;">
                <p id="logoFallback">Logo</p>
            </div>
        </section>

        <!-- Profile info row - Updated by Day Ekoi 4/20/26 -->
        <section class="store-info-row">

            <!-- name left, buttons right — same row -->
            <div class="name-btn-row">
                <h2 class="brand-name" id="brandName">Loading...</h2>
                <div class="dashboard-actions">
                    <button class="action-btn" id="editStorefrontBtn">Edit Storefront</button>
                    <button class="action-btn" id="createListingBtn">+ Create New Listing</button>
                    <button class="action-btn" id="viewStorefrontBtn">View Public Storefront</button>
                    <button class="action-btn action-btn--danger" id="deactivateStorefrontBtn">Deactivate Storefront</button>
                </div>
            </div>

            <!-- contact + bio left-aligned below name -->
            <p id="contactInfo" class="store-contact"></p>
            <p id="storeDescription" class="store-bio"></p>

        </section>

        <!-- Listings section -->
        <section class="listings-section">
            <div class="listing-grid" id="listingGrid"></div>
        </section>

    </main>

    <script src="{{ url_for('static', filename='js/my_storefront.js') }}"></script>
</body>
</html>
