Description of file (What it does, how it is used, etc):
This file holds the main UI strucutre for the storefront homepage of the Vault. It includes the top navigation bar, logo and search section, 
and the main content area where storefront cards will be displayed. The storefront cards are generated dynamically using storefront.js. This page serves as the entry point for users to explore different storefronts available on the website.
It is simply the skeleton/template of the storefront page, all styling is handled by storefront.css
The cards are not hardcoded into HTML, but there is a grid container that the javascript file added dynamically as users create storefronts.
This page will connect to the Flask backend and database by requesting storefront data from the created API routes and displaying them once created.

Purpose simplified: Creates page structure:
Top bar: menu button on left, cart and profile icons on right
Logo/Title and search section: The Vault logo/title and a search bar for users to search for storefronts
Main content: where storefront cards will be displayed, along with pagination controls at bottom of page
Script connection: Links and loads JS file that actually creates the storefront cards dynamically
