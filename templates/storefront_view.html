Description of file (What it does, how it is used, etc):

This file is the public storefront view page. It displays a storefront the way regular users/shoppers
would see it after clicking "Enter Storefront" from the storefront homepage.

This page shows:
- Back button to return to storefront homepage
- Storefront banner
- Store logo
- Brand name
- Contact info
- Store description
- Listings available in that storefront

This file acts as the UI structure for the public storefront page.
-->

<!DOCTYPE html>
<html lang="en">
<head>

    <!-- Metadata stuff -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title shown in browser tab -->
    <title>Storefront View</title>

    <!-- live server version -->
    <link rel="stylesheet" href="./storefront_view.css">

<!-- Flask Version 
    <link rel="stylesheet" href="{{ url_for('static', filename='css/storefront_view.css') }}"> -->

</head>

<body>
<!-- Start of main body code -->

    <!-- Main wrapper -->
    <main class="storefront-view-page">

        <!-- banner section: holds back button, banner, logo, and top store info -->
        <section class="storefront-top">

            <!-- banner box -->
            <div class="storefront-banner">

                <!-- back button -->
                <button class="back-btn" id="backBtn">&larr; CONTINUE SHOPPING</button>

                <!-- banner text -->
                <div class="banner-text-wrap">
                    <h1 class="brand-name">The Vault</h1>
                    <h2 class="banner-title">Storefront View</h2>
                    <p class="contact-info">@brandname • contact info</p>
                </div>

            </div>

            <!-- overlapping logo -->
            <div class="storefront-logo">
                <p>Logo</p>
            </div>

        </section>


        <!-- store description section -->
        <section class="store-description-section">
            <p class="store-description-title">Store Description</p>
            <p class="store-description-text">
                This is where the storefront description will go. It can explain the brand,
                what it sells, its target audience, and the style or vibe of the store.
            </p>
        </section>


        <!-- listings section -->
        <section class="storefront-listings-section">

            <!-- section title -->
            <h3 class="listings-heading">Shop 'Brand Name'</h3>

            <!-- dynamic listing grid -->
            <div class="listing-grid" id="listingGrid"></div>

        </section>

    </main>

    <!-- live server version -->
    <script src="./storefront_view.js"></script>

    <!-- javascript 
    <script src="{{ url_for('static', filename='js/storefront_view.js') }}"></script> -->


</body>
</html>
